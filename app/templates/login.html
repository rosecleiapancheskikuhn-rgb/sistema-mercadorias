<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - Sistema de Mercadorias</title>

<style>

body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.login-container {
    background:#111827;
    padding:40px;
    border-radius:16px;
    width:350px;
    box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.login-container h2 {
    text-align:center;
    margin-bottom:30px;
}

input {
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:white;
}

input:focus {
    outline:none;
    border:1px solid #2563eb;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    background:#1d4ed8;
}

.logo {
    text-align:center;
    font-size:26px;
    margin-bottom:20px;
}

</style>
</head>

<body>

<div class="login-container">

    <div class="logo">
        📦 Sistema de Mercadorias
    </div>

    <h2>Login</h2>

    <form method="POST">
        <input type="text" name="usuario" placeholder="Usuário" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>

</div>

</body>
</html>
